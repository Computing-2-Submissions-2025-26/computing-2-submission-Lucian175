<!DOCTYPE html>
<html lang="en">
<script type="module" src="main.js"></script>
<meta charset="UTF-8">
<title>Othello</title>
<link rel="stylesheet" href="default.css">


<main>
    <div id="game-result" class="hidden" role="status" aria-live="polite"></div>
    <div id="game-wrapper">

        <div class="disc-stack" id="black-stack">
            <img class="disc-top" id="black-top" src="./assets/disc-black.svg" alt="Black disc">
        </div>

        <div id="board-area">
            <div id="game-board"></div>
        </div>

        <div class="disc-stack" id="white-stack">
            <img class="disc-top" id="white-top" src="./assets/disc-white.svg" alt="White disc">
        </div>
    </div>
    <img id="mode-indicator" src="./assets/mouse.svg" alt="Mouse mode">
</main>


</html>
